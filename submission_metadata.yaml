ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude used for architecture discussion, code review, and helping integrate
  contributions from four team members into a single offline ranker.
  No candidate data was fed to any LLM. All ranking logic is deterministic
  and runs fully offline.

methodology_summary: |
  Five-component offline ranker (no API calls, no GPU):
  (1) AI Skill Match (35%): keyword matching against JD's AI/IR skill inventory,
  weighted by proficiency level, duration_months, endorsements, and
  skill_assessment_scores from redrob_signals.
  (2) Career Quality (30%): product company vs consulting ratio, fraction of
  career in AI/ML roles, production evidence in role descriptions.
  (3) Availability (20%): 23 redrob behavioral signals — open_to_work_flag,
  last_active_date recency, recruiter_response_rate, notice_period_days,
  interview_completion_rate, github_activity_score.
  (4) Experience Fit (10%): piecewise scoring peaking at 6-8 years.
  (5) Location (5%): India-based preferred; non-India + willing_to_relocate
  gets partial credit.
  Honeypot detection via impossible profile checks filters synthetic traps.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
